<!-- 1. NOME DO FICHEIRO: index.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes"><title>Vwheel PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen" style="position:fixed; inset:0; background:#0b0e14; z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div style="width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top:3px solid #3b82f6; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <div id="app-section" style="display:none; min-height:100vh; background:#0b0e14; color:#fff; font-family:'Outfit';">
        <header style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:800; font-size:1.4rem;">Vwheel PRO</div>
            <div style="color:#3b82f6; font-weight:800;">ATIVO</div>
        </header>
        <div id="cal-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:10px; padding:20px;"></div>
    </div>
    <div id="modal-day" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:flex-end; justify-content:center;">
        <div style="width:100%; max-width:500px; background:#161a22; border-radius:30px 30px 0 0; padding:30px; color:#fff;">
            <h3 id="lbl-date" style="margin-bottom:20px;">Dia</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                <input type="number" id="km-start" placeholder="KM INÍCIO" style="background:#0b0e14; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; text-align:center;">
                <input type="number" id="km-end" placeholder="KM FIM" style="background:#0b0e14; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; text-align:center;">
            </div>
            <button id="btn-save" style="width:100%; background:#3b82f6; color:#fff; padding:18px; border:none; border-radius:15px; font-weight:800;">GRAVAR E RESUMO</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
